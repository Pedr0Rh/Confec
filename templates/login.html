<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <title>Login - Confecção</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { 
            --primary-color: #1a1a2e; 
            --secondary-color: #e94560; 
            --nexus-color: #00d4ff;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 420px;
            width: 100%;
        }
        .login-card .logo { text-align: center; margin-bottom: 30px; }
        .login-card .logo h1 { 
            color: var(--primary-color); 
            font-weight: 700; 
            font-size: 2rem; 
        }
        .login-card .logo h1 i { color: var(--secondary-color); }
        .login-card .logo p { color: #6c757d; font-size: 0.9rem; }
        .login-card .form-control { 
            border-radius: 10px; 
            padding: 12px 15px; 
            border: 2px solid #e9ecef; 
        }
        .login-card .form-control:focus { 
            border-color: var(--secondary-color); 
            box-shadow: 0 0 0 0.2rem rgba(233, 69, 96, 0.15); 
        }
        .login-card .btn-login {
            background: var(--secondary-color);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.3s;
        }
        .login-card .btn-login:hover { 
            background: #c0392b; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.3); 
        }
        .login-card .footer-text { 
            text-align: center; 
            margin-top: 20px; 
            color: #6c757d; 
            font-size: 0.85rem; 
        }
        .login-card .footer-text .nexus {
            color: var(--nexus-color);
            font-weight: 700;
            letter-spacing: 1px;
        }
        .login-card .footer-text .nexus i {
            font-size: 0.9rem;
        }
        .login-card .footer-text span { 
            color: var(--secondary-color); 
            font-weight: 600; 
        }
        .alert { border-radius: 10px; }
        
        /* ===== COPYRIGHT ===== */
        .copyright {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #e9ecef;
            font-size: 0.75rem;
            color: #adb5bd;
        }
        .copyright .nexus-tech {
            color: var(--nexus-color);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        .copyright .nexus-tech:hover {
            color: #00b8e6;
            text-decoration: underline;
        }
        .copyright i {
            color: var(--secondary-color);
            margin: 0 3px;
        }
        
        @media (max-width: 480px) { 
            .login-card { padding: 25px; } 
            .login-card .logo h1 { font-size: 1.5rem; } 
            .copyright { font-size: 0.65rem; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1><i class="bi bi-box-seam"></i> Confecção</h1>
            <p>Sistema de Gerenciamento</p>
        </div>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="alert alert-danger">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Digite sua senha" required>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>
        </form>
        
       
        
        <!-- ===== COPYRIGHT NEXUS TECH ===== -->
        <div class="copyright">
            <i class="bi bi-c-circle"></i> 2026 
            <a href="#" class="nexus-tech" target="_blank">
                <i class="bi bi-lightning-fill"></i> Nexus Tech
            </a>
            <br>
            <span style="font-size: 0.7rem; color: #ced4da;">
                Todos os direitos reservados
            </span>
        </div>
    </div>
</body>
</html>
